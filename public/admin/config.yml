# Abjatal Star Enterprise — Netlify CMS
# Docs: https://www.netlifycms.org/docs/
# Access at: yoursite.com/admin

backend:
  name: git-gateway
  branch: main

# Local editing: run `npm run cms` in a separate terminal
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://abjatalstar.netlify.app
display_url: https://abjatalstar.netlify.app
logo_url: /abjatal-star-logo.png

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  # ─────────────────────────────────────────
  # SITE SETTINGS
  # ─────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "Business Information"
        name: "site"
        file: "content/settings/site.json"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Short Name", name: "shortName", widget: "string", hint: "Used in navigation and chatbot" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string", hint: "e.g. FX Bureau · Remittance · Orange Money" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Phone Display", name: "phoneDisplay", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string", hint: "Numbers only, e.g. 232760000000" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Year Founded", name: "founded", widget: "string" }
          - { label: "License Text", name: "license", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image", hint: "Upload your business logo" }
          - label: "Business Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Weekdays", name: "weekdays", widget: "string" }
              - { label: "Saturday", name: "saturday", widget: "string" }
              - { label: "Sunday", name: "sunday", widget: "string" }
              - { label: "Summary (Footer)", name: "summary", widget: "string" }
          - label: "Social Media Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string" }
              - { label: "Twitter URL", name: "twitter", widget: "string" }
              - { label: "Instagram URL", name: "instagram", widget: "string" }

  # ─────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────
  - name: "home"
    label: "🏠 Home Page"
    files:
      - label: "Homepage Content"
        name: "homepage-content"
        file: "content/pages/home.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Badge Text", name: "badge", widget: "string" }
              - { label: "Title (Part 1)", name: "title", widget: "string" }
              - { label: "Title Highlight", name: "titleHighlight", widget: "string", hint: "Colored gradient text" }
              - { label: "Title (Part 2)", name: "titleSuffix", widget: "string" }
              - { label: "Primary Button", name: "primaryButton", widget: "string" }
              - { label: "Secondary Button", name: "secondaryButton", widget: "string" }
              - { label: "Trust Badges Label", name: "trustLabel", widget: "string" }
              - label: "Stats Card"
                name: "statsCard"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
                  - label: "Sample Transactions"
                    name: "transactions"
                    widget: "list"
                    fields:
                      - { label: "Service", name: "label", widget: "string" }
                      - { label: "Amount/Description", name: "amount", widget: "string" }
                      - { label: "Status", name: "status", widget: "string" }
                  - { label: "Security Title", name: "securityTitle", widget: "string" }
                  - { label: "Security Text", name: "securityText", widget: "string" }
          - label: "Trust Badges"
            name: "trustBadges"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "select", options: ["ShieldCheck", "Lock", "Users", "Award"] }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Highlight (optional)", name: "highlight", widget: "string", required: false }
              - { label: "Subtext", name: "sub", widget: "string" }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["blue", "purple", "red", "orange"] }
          - label: "Partners Section"
            name: "partners"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Services Section"
            name: "services"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Number to Show", name: "limit", widget: "number", value_type: "int", min: 1, max: 8 }
              - { label: "Show View All Button", name: "showViewAll", widget: "boolean", default: true }
              - { label: "View All Button Text", name: "viewAllText", widget: "string" }
          - label: "Why Choose Us Section"
            name: "whyChooseUs"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Stats"
                name: "stats"
                widget: "object"
                fields:
                  - { label: "Customers Count", name: "customers", widget: "string" }
                  - { label: "Customers Label", name: "customersLabel", widget: "string" }
                  - { label: "Branches Count", name: "branches", widget: "string" }
                  - { label: "Branches Label", name: "branchesLabel", widget: "string" }
                  - { label: "Partners Count", name: "partners", widget: "string" }
                  - { label: "Partners Label", name: "partnersLabel", widget: "string" }
                  - { label: "Years Count", name: "years", widget: "string" }
                  - { label: "Years Label", name: "yearsLabel", widget: "string" }
          - label: "Branches Section"
            name: "branches"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Number to Show", name: "limit", widget: "number", value_type: "int", min: 1, max: 10 }
              - { label: "Show View All Button", name: "showViewAll", widget: "boolean", default: true }
              - { label: "View All Button Text", name: "viewAllText", widget: "string" }
              - { label: "Banner Text", name: "bannerText", widget: "string", hint: "Text after branch count" }
          - label: "How It Works Section"
            name: "howItWorks"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Compact Mode", name: "compact", widget: "boolean", default: true }
              - { label: "Link Text", name: "linkText", widget: "string" }
          - label: "Contact Section"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - label: "Why Choose Us Items"
        name: "why-choose-us"
        file: "content/shared/why-choose-us.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon", name: "icon", widget: "select", options: ["Zap", "ShieldCheck", "MapPin", "HeartHandshake", "UserCheck", "BadgePercent", "Navigation"] }

  # ─────────────────────────────────────────
  # ABOUT PAGE
  # ─────────────────────────────────────────
  - name: "about"
    label: "📖 About Us"
    files:
      - label: "About Page"
        name: "about-page"
        file: "content/pages/about.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
          - label: "Page Header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Who We Are"
            name: "whoWeAre"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - label: "Mission"
            name: "mission"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Vision"
            name: "vision"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Core Values"
            name: "values"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Values"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - { label: "Show Trust Badges", name: "showTrustBadges", widget: "boolean", default: true }
          - { label: "Show Why Choose Us", name: "showWhyChooseUs", widget: "boolean", default: true }

  # ─────────────────────────────────────────
  # SERVICES PAGE
  # ─────────────────────────────────────────
  - name: "services"
    label: "💼 Services"
    files:
      - label: "Services Page"
        name: "services-page"
        file: "content/pages/services.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
          - label: "Page Header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Services Section"
            name: "servicesSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Partners Section"
            name: "partnersSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - label: "Service Items"
        name: "service-items"
        file: "content/shared/services.json"
        fields:
          - label: "Services"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Unique ID, e.g. international" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon", name: "icon", widget: "select", options: ["Globe2", "ArrowDownToLine", "Smartphone", "Users", "ArrowLeftRight", "Briefcase", "Receipt", "Headphones"] }
              - label: "Features"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }

      - label: "Payment Partners"
        name: "partners"
        file: "content/shared/partners.json"
        fields:
          - label: "Partners"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon", name: "icon", widget: "select", options: ["Globe", "Send", "Banknote", "Smartphone", "Wallet", "Building2"] }
              - { label: "Icon Color Class", name: "color", widget: "string", hint: "e.g. text-yellow-600" }
              - { label: "Background Class", name: "bgColor", widget: "string", hint: "e.g. bg-yellow-50" }

  # ─────────────────────────────────────────
  # BRANCHES PAGE
  # ─────────────────────────────────────────
  - name: "branches"
    label: "📍 Branches"
    files:
      - label: "Branches Page"
        name: "branches-page"
        file: "content/pages/branches.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
          - label: "Page Header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Section"
            name: "section"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Banner Text", name: "bannerText", widget: "string" }

      - label: "Branch Locations"
        name: "branch-locations"
        file: "content/shared/branches.json"
        fields:
          - label: "Branches"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "e.g. freetown" }
              - { label: "Branch Name", name: "name", widget: "string" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - label: "Opening Hours"
                name: "hours"
                widget: "object"
                fields:
                  - { label: "Weekdays", name: "weekdays", widget: "string" }
                  - { label: "Saturday", name: "saturday", widget: "string" }
                  - { label: "Sunday", name: "sunday", widget: "string" }
              - label: "Available Services"
                name: "services"
                widget: "list"
                field: { label: "Service", name: "service", widget: "string" }
              - { label: "Main Branch", name: "isMain", widget: "boolean", default: false, required: false }

  # ─────────────────────────────────────────
  # HOW IT WORKS PAGE
  # ─────────────────────────────────────────
  - name: "how-it-works"
    label: "🔄 How It Works"
    files:
      - label: "How It Works Page"
        name: "how-it-works-page"
        file: "content/pages/how-it-works.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
          - label: "Page Header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Section"
            name: "section"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Sending Title", name: "sendingTitle", widget: "string" }
              - { label: "Receiving Title", name: "receivingTitle", widget: "string" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Primary Button", name: "primaryButton", widget: "string" }
              - { label: "Secondary Button", name: "secondaryButton", widget: "string" }

      - label: "Process Steps"
        name: "steps"
        file: "content/shared/how-it-works.json"
        fields:
          - label: "Sending Money Steps"
            name: "sending"
            widget: "list"
            fields:
              - { label: "Step Number", name: "number", widget: "number", value_type: "int" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon", name: "icon", widget: "select", options: ["MapPinned", "FileText", "CreditCard", "Banknote"] }
          - label: "Receiving Money Steps"
            name: "receiving"
            widget: "list"
            fields:
              - { label: "Step Number", name: "number", widget: "number", value_type: "int" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon", name: "icon", widget: "select", options: ["IdCard", "Hash", "ShieldCheck", "Wallet"] }

  # ─────────────────────────────────────────
  # CONTACT PAGE
  # ─────────────────────────────────────────
  - name: "contact"
    label: "📞 Contact Us"
    files:
      - label: "Contact Page"
        name: "contact-page"
        file: "content/pages/contact.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
          - label: "Page Header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Contact Section"
            name: "section"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Contact Info Title", name: "contactInfoTitle", widget: "string" }
              - { label: "Form Title", name: "formTitle", widget: "string" }
              - { label: "Success Title", name: "successTitle", widget: "string" }
              - { label: "Success Message", name: "successMessage", widget: "text" }
              - { label: "Send Another Text", name: "sendAnotherText", widget: "string" }
              - { label: "Submit Button", name: "submitButton", widget: "string" }
              - label: "Form Fields"
                name: "fields"
                widget: "object"
                fields:
                  - label: "Full Name"
                    name: "fullName"
                    widget: "object"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Placeholder", name: "placeholder", widget: "string" }
                  - label: "Phone"
                    name: "phone"
                    widget: "object"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Placeholder", name: "placeholder", widget: "string" }
                  - label: "Service"
                    name: "service"
                    widget: "object"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Placeholder", name: "placeholder", widget: "string" }
                  - label: "Message"
                    name: "message"
                    widget: "object"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Placeholder", name: "placeholder", widget: "string" }
          - label: "Service Options (Dropdown)"
            name: "serviceOptions"
            widget: "list"
            field: { label: "Option", name: "option", widget: "string" }
